name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: spm-

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Trakke.xcodeproj -scheme Trakke

      - name: Run unit tests
        run: |
          xcodebuild \
            -project Trakke.xcodeproj \
            -scheme Trakke \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -skipMacroValidation \
            -only-testing:TrakkeTests \
            -testLanguage nb \
            -testRegion NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: TestResults.xcresult
          retention-days: 14
