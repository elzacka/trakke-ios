name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d /Applications/Xcode_26.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.app/Contents/Developer
          elif [ -d /Applications/Xcode_26.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer
          else
            echo "::error::Xcode 26.3 or 26.4 not found on runner"; exit 1
          fi
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
          key: spm-${{ hashFiles('Trakke.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Trakke.xcodeproj -scheme Trakke

      - name: Find available simulator
        id: simulator
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in sorted(data['devices'].items(), reverse=True):
              if 'iOS-26' in runtime or 'iOS 26' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name'])
                          sys.exit(0)
          # Fallback: any available iPhone
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime:
                  for d in devices:
                      if 'iPhone' in d['name'] and d['isAvailable']:
                          print(d['name'])
                          sys.exit(0)
          print('iPhone 16 Pro')
          ")
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $DEVICE"

      - name: Run unit tests
        run: |
          xcodebuild \
            -project Trakke.xcodeproj \
            -scheme Trakke \
            -destination 'platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}' \
            -skipMacroValidation \
            -only-testing:TrakkeTests \
            -testLanguage nb \
            -testRegion NO \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            test

      - name: Build Release
        run: |
          xcodebuild \
            -project Trakke.xcodeproj \
            -scheme Trakke \
            -configuration Release \
            -destination 'platform=iOS Simulator,name=${{ steps.simulator.outputs.device }}' \
            -skipMacroValidation \
            build

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.run_number }}
          path: TestResults.xcresult
          retention-days: 14
